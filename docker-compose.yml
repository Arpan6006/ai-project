services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile.multistage
      target: backend
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_URL=postgresql://postgres:password@db:5432/stock_prediction
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.multistage
      target: frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  db:
    image: postgres:13
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=stock_prediction
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
